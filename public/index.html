<!DOCTYPE html>
<html>
<head>
  <title>FiooAnj Sc By Zennq</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

    html{scroll-behavior:smooth;}

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
    }

    body{
      background:url('background.jpg') no-repeat center center/cover;
      color:white;
    }

    /* GRID */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      width:200%;
      height:200%;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.02), transparent 40px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02), transparent 40px);
      animation:move 20s linear infinite;
    }

    @keyframes move{
      from{transform:translate(0,0);}
      to{transform:translate(-200px,-200px);}
    }

    .overlay{
      position:relative;
      width:100%;
      min-height:100vh;
      background:rgba(0,0,0,0.5);

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;

      padding-top:50px;
      z-index:1;
    }

    .panel{
      width:90%;
      max-width:900px;
      padding:40px;
      border-radius:20px;
      text-align:center;
      backdrop-filter:blur(10px);
      animation:glow 6s infinite alternate;
    }

    @keyframes glow{
      0%{box-shadow:0 0 20px red;}
      25%{box-shadow:0 0 20px blue;}
      50%{box-shadow:0 0 20px purple;}
      75%{box-shadow:0 0 20px cyan;}
      100%{box-shadow:0 0 20px lime;}
    }

    .title{
      font-size:42px;
      margin-bottom:20px;
      animation:textGlow 5s infinite alternate;
    }

    @keyframes textGlow{
      0%{text-shadow:0 0 10px red;}
      25%{text-shadow:0 0 10px blue;}
      50%{text-shadow:0 0 10px purple;}
      75%{text-shadow:0 0 10px cyan;}
      100%{text-shadow:0 0 10px lime;}
    }

    .field{font-size:20px;margin:10px 0;}

    input{
      margin-top:15px;
      padding:10px;
      width:80%;
      border-radius:10px;
      border:none;
      text-align:center;
    }

    .buttons{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .btn{
      padding:12px 20px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      background:rgba(255,255,255,0.1);
      color:white;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.1);
      box-shadow:0 0 20px white;
    }

    /* 🔥 SPINNER BRUTAL */
    .loader{
      margin-top:20px;
      width:100px;
      height:100px;
      position:relative;
      display:none;
    }

    .ring{
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      border:4px solid transparent;
      border-top:4px solid red;
      animation:spin 1s linear infinite, rgb 3s infinite alternate;
      filter:blur(1px);
    }

    .ring2{
      width:80%;
      height:80%;
      top:10%;
      left:10%;
      animation-duration:0.8s;
      filter:blur(3px);
    }

    .ring3{
      width:60%;
      height:60%;
      top:20%;
      left:20%;
      animation-duration:0.6s;
      filter:blur(6px);
    }

    @keyframes spin{to{transform:rotate(360deg);}}

    @keyframes rgb{
      0%{border-top-color:red;box-shadow:0 0 20px red,0 0 40px red;}
      25%{border-top-color:blue;box-shadow:0 0 20px blue,0 0 40px blue;}
      50%{border-top-color:purple;box-shadow:0 0 20px purple,0 0 40px purple;}
      75%{border-top-color:cyan;box-shadow:0 0 20px cyan,0 0 40px cyan;}
      100%{border-top-color:lime;box-shadow:0 0 20px lime,0 0 40px lime;}
    }

    .preview{
      margin-top:20px;
      width:90%;
      max-width:900px;
      display:none;
      text-align:center;
    }

    video{
      width:100%;
      border-radius:15px;
      margin-top:10px;
    }

  </style>
</head>

<body>

<div class="overlay">

  <div class="panel">
    <div class="title">𝕯𝖆𝖘𝖍𝖇𝖔𝖆𝖗𝖉 𝕱𝖎𝖔𝖔</div>

    <div class="field">Status: <span id="status">Loading...</span></div>
    <div class="field">Uptime: <span id="uptime">0</span>s</div>
    <div class="field">Owner: 𝕱𝖎𝖔𝖔</div>

    <input id="ttlink" placeholder="Paste link TikTok disini">

    <div class="buttons">
      <button class="btn" onclick="downloadTT()">Download TikTok</button>
    </div>

    <!-- 🔄 SPINNER -->
    <div id="loader" class="loader">
      <div class="ring"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
    </div>

    <!-- DOWNLOAD BUTTON -->
    <div class="buttons">
      <a id="downloadBtn" class="btn" target="_blank">Download Video</a>
    </div>

    <div class="buttons">
      <a class="btn" href="https://discord.com/users/1356939917749387305" target="_blank">Owner</a>
      <a class="btn" href="https://discord.com/oauth2/authorize?client_id=1469601350441635852" target="_blank">Invite</a>
      <button class="btn" onclick="playAudio()">Play</button>
      <button class="btn" onclick="stopAudio()">Stop</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview" id="previewBox">
    <h2>Preview Video</h2>
    <video id="videoPreview" controls></video>
  </div>

</div>

<audio id="audio">
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
